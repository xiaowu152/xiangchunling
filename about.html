  <p>2026年3月21日（春分），林守山独自进山采药后失联。村委会及药婆陈阿婆已组织搜寻，尚未发现踪迹。店铺暂由其孙女<strong>林晚</strong>代管。</p>
  <p>店内员工：<strong>小李（李远志）</strong>，17岁，负责接待与熬药。小李常在日志本上记录药方与山间见闻。</p>
  <p>📌 村中老人说，香椿岭有句老话：“<strong>净念</strong>方能见老母，<strong>献祭</strong>才可保丰年。”不知何意。</p>
